# ForgetfulDB configuration. Copy to forgetfuldb.toml and edit.
# Every field is optional; missing fields use these defaults.
#
# Config resolution: --config flag > ./forgetfuldb.toml (project-local
# store) > ~/.forgetfuldb/forgetfuldb.toml (the shared global store,
# created automatically so memories persist across all sessions).

# Friendly name shown in banners and stats, so it's always clear which
# memory database a session is talking to.
name = "main"

# Relative paths resolve against this file's directory (never the cwd).
sqlite_path = "forgetfuldb.sqlite3"

# v1 ships "hashed_bow" (deterministic, model-free).
# Roadmap: fastembed, candle, llama_cpp, coreml.
embedding_backend = "hashed_bow"
embedding_dim = 256

# Exponential decay constants (per day). Higher = forgets faster.
decay_lambda_raw = 0.35        # raw events: half-life ~2 days
decay_lambda_episodic = 0.08   # episodes:   half-life ~9 days
decay_lambda_semantic = 0.01   # facts:      half-life ~70 days
decay_lambda_procedural = 0.01
decay_lambda_preference = 0.02

# Raw events older than this (days) become archive memories.
archive_after_days = 14.0
# Archived, unpinned memories older than this (days) are deleted.
delete_after_days = 90.0

# Never talk to the network. The HTTP server binds 127.0.0.1 when true,
# and the chat backend URL must be localhost.
local_only = true

# Settings for the iforgot terminal chat and the /v1 memory proxy.
[chat]
backend = "ollama"                    # "ollama" or "openai_compat" (llama-server, LM Studio, ...)
base_url = "http://127.0.0.1:11434"
# Leave empty to pick interactively on first `iforgot` run (the choice is
# saved here). Change anytime with `iforgot --model <name>` or `/model`.
model = ""
top_k = 6                             # memories injected per turn
history_turns = 8                     # past exchanges kept in the prompt
keep_alive = "30m"                    # how long Ollama keeps the model loaded
# The assistant's persona. Default: a developer's assistant that remembers,
# runs AI-assisted shell commands via tools, and is extensible for private
# tasks. Replace with your own to repurpose iForgot.
system_prompt = "You are iForgot, a local AI assistant for a software developer. You help with coding and day-to-day tasks, you keep track of the user's long-term memories, and you can run AI-assisted shell commands through your tools. Use the user's memories when they are relevant, and say so plainly when you don't know something. Be concise and practical. Format answers in Markdown."

# Tool integration. The assistant can propose actions (e.g. shell commands);
# in the `iforgot` CLI nothing runs until you confirm with Enter/y.
[tools]
enabled = true                        # may the assistant use tools at all?
shell_enabled = true                  # allow the built-in shell tool
shell_timeout_secs = 30               # kill a command that runs longer
# Let the HTTP server's /tools/execute actually run tools. OFF by default:
# an HTTP endpoint can't ask a human to confirm, so this is a remote shell.
# Enable only on a trusted local machine.
allow_server_execute = false

[retrieval_weights]
semantic = 0.45
importance = 0.20
recurrence = 0.15
recency = 0.10
pinned_boost = 0.10
staleness_penalty = 0.20

[consolidation_thresholds]
duplicate_similarity = 0.92      # cosine at/above which memories merge
cluster_min_size = 3             # topic cluster size that earns a summary
promote_min_access_count = 3     # accesses before episodic -> semantic
archive_max_decay = 0.05         # decay score below which raw events archive
prune_sample_size = 5            # reservoir sample kept when pruning
